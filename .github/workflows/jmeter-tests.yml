name: JMeter Performance Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  jmeter-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install JMeter
        run: |
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz
          echo "JMETER_HOME=\D:\jmeter-performance-testing/apache-jmeter-5.6.3" >> \
          echo "\D:\jmeter-performance-testing/apache-jmeter-5.6.3/bin" >> \

      - name: Run smoke test
        run: |
          jmeter -n -t test-plans/smoke-test.jmx -l results/smoke-results.jtl -e -o results/smoke-report
        continue-on-error: true

      - name: Run Python analytics tests
        run: python -m pytest tests/ -v --tb=short

      - name: Upload JMeter results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-results
          path: results/
